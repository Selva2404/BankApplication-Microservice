server:
  port: 8500

spring:
  application:
    name: "eurekaserver"
  config:
    import: "configserver:http://localhost:8000/"
management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    shutdown:
      access: unrestricted
  info:
    env:
      enabled: true
