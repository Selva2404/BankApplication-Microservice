spring:
 application:
  name: "configserver"

 cloud:
  config:
   server:
    git:
     uri: "https://github.com/Selva2404/config-all-service.git"
     clone-on-start: true
     default-label: "main"
     timeout: 5

management:
 endpoints:
  web:
   exposure:
    include: "*"
 health:
  readiness-state:
   enabled: true
  liveness-state:
   enabled: true
 endpoint:
  health:
   probes:
    enabled: true


server:
  port: "8000"
