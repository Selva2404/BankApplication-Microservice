  configserver:
    image: "selva2404/startservice:s6"
    container_name: "configserver-ms"
    ports:
      - "8000:8000"
    platform: linux/amd64
#    depends_on:
#      rabbit:
#        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:8000/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      retries: 5
      timeout: 10s
      start_period: 10s
    environment:
      SPRING_APPLICATION_NAME: "configserver"
    extends:
      file: common-config.yml
      service: microservice-common-config

  eurekaserver:
    image: "selva2404/eurekaserver:s6"
    container_name: "eurekaserver-ms"
    ports:
      - "8500:8500"
    platform: linux/amd64
    #    depends_on:
    #      rabbit:
    #        condition: service_healthy
    depends_on:
      configserver:
        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:8500/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      retries: 5
      timeout: 10s
      start_period: 10s
    extends:
      file: common-config.yml
      service: microservice-config
    environment:
      SPRING_APPLICATION_NAME: eurekaserver

  account:
    image: "selva2404/account:s6"
    container_name: "account_ms"
    ports:
      - "8080:8080"
    platform: linux/amd64
    depends_on:
      configserver:
        condition: service_healthy
#      accountsdb:
#        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:8080/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      retries: 5
      timeout: 10s
      start_period: 10s
    environment:
      SPRING_APPLICATION_NAME: "account"
      SPRING_DATASOURCE_URL: "jdbc:h2:mem:accountsdb"
      SPRING_DATASOURCE_USERNAME: "sa"
      SPRING_DATASOURCE_PASSWORD: ""

    extends:
      file: common-config.yml
      service: microservice-eureka-config

  loans:
    image: "selva2404/loanservice:s6"
    container_name: "loans_ms"
    ports:
      - "8100:8100"
    platform: linux/amd64
    depends_on:
      configserver:
        condition: service_healthy
#      loansdb:
#        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:8100/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      retries: 5
      timeout: 10s
      start_period: 10s
    environment:
      SPRING_APPLICATION_NAME: "loans"
      SPRING_DATASOURCE_URL: "jdbc:h2:mem:loansdb"
      SPRING_DATASOURCE_USERNAME: "sa"
      SPRING_DATASOURCE_PASSWORD: ""
    extends:
      file: common-config.yml
      service: microservice-eureka-config

  cards:
    image: "selva2404/cardservice:s6"
    container_name: "cards_ms"
    ports:
      - "9000:9000"
    platform: linux/amd64
    depends_on:
      configserver:
        condition: service_healthy
#      cardsdb:
#        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:9000/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      retries: 5
      timeout: 10s
      start_period: 10s
    environment:
      SPRING_APPLICATION_NAME: "cards"
      SPRING_DATASOURCE_URL: "jdbc:h2:mem:cardsdb"
      SPRING_DATASOURCE_USERNAME: "sa"
      SPRING_DATASOURCE_PASSWORD: ""
    extends:
      file: common-config.yml
      service: microservice-eureka-config

  bankgateway:
    image: "selva2404/bankgateway:s6"
    container_name: "bankgateway_ms"
    ports:
      - "8300:8300"
    platform: linux/amd64
    depends_on:
      configserver:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
      account:
        condition: service_healthy
      loans:
        condition: service_healthy
      cards:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "bankgateway"
    extends:
      file: common-config.yml
      service: microservice-eureka-config
networks:
  selva2404_network:
    driver: "bridge"

